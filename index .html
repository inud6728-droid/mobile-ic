<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile IC Search</title>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .app-logo { width: 55px; height: 55px; fill: #ecc94b; margin-bottom: 10px; }
        .header h1 { font-size: 26px; margin: 0; color: #ffffff; font-weight: 700; }
        .search-box { width: 100%; padding: 16px; background-color: #121212; border: 2px solid #2d3748; border-radius: 12px; color: #ffffff; font-size: 16px; box-sizing: border-box; margin-bottom: 25px; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: #ecc94b; }
        .ic-list { display: flex; flex-direction: column; gap: 12px; }
        .ic-card { background-color: #0b0c10; padding: 16px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1f2937; cursor: pointer; }
        .gb-tag { background-color: #1a202c; color: #ecc94b; padding: 6px 14px; border-radius: 8px; font-weight: 700; font-size: 13px; border: 1px solid #2d3748; }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; padding: 20px; }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-content { background-color: #121212; border: 2px solid #ecc94b; border-radius: 20px; width: 100%; max-width: 400px; padding: 25px; text-align: center; }
        .speak-btn { background-color: #1a202c; color: #ecc94b; border: 1px solid #ecc94b; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-bottom: 15px; }
        .modal-info-box { background-color: #000000; border: 1px solid #2d3748; border-radius: 12px; padding: 15px; margin: 15px 0; text-align: left; }
        .close-btn { background-color: #ecc94b; color: #000000; border: none; padding: 12px; font-weight: 700; border-radius: 10px; width: 100%; cursor: pointer; }
    </style>
</head>

        const icContainer = document.getElementById('icContainer');
        const searchInput = document.getElementById('searchInput');

        function displayICs(data, isSearching) {
            icContainer.innerHTML = "";
            if (!isSearching || data.length === 0) return;

            data.forEach(ic => {
                const card = document.createElement('div');
                card.className = 'ic-card';
                card.onclick = () => {
                    document.getElementById('modalICName').textContent = ic.name;
                    document.getElementById('modalICBrand').textContent = ic.brand;
                    document.getElementById('modalICSize').textContent = ic.size;
                    document.getElementById('detailsModal').classList.add('show');
                };
                card.innerHTML = `<div><h3>${ic.name}</h3><p>${ic.brand}</p></div><div class="gb-tag">${ic.size}</div>`;
                icContainer.appendChild(card);
            });
        }

        searchInput.addEventListener('input', () => {
            const val = searchInput.value.toUpperCase().trim();
            if (val === "") {
                displayICs([], false);
            } else {
                const filtered = icDatabase.filter(ic => ic.name.includes(val));
                displayICs(filtered, true);
            }
        });

        document.getElementById('closeModalBtn').onclick = () => document.getElementById('detailsModal').classList.remove('show');
    </script>
